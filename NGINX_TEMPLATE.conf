# =========================================================================
# THE SPIRITUAL TREND - NGINX VPS REVERSE PROXY TEMPLATE
# =========================================================================
# Location on VPS: /etc/nginx/sites-available/default
# Activate with: sudo ln -s /etc/nginx/sites-available/default /etc/nginx/sites-enabled/
# Test Nginx with: sudo nginx -t
# Reload Nginx with: sudo systemctl reload nginx
# =========================================================================

# 1. Main Server Block: Customer Frontend & API Server Gateway
server {
    listen 80;
    listen [::]:80;
    
    # REPLACE WITH YOUR ACTUAL VPS DOMAIN OR IP ADDRESS
    server_name thespiritualtrends.com www.thespiritualtrends.com;

    # Increase maximum upload size for high-resolution product images (e.g. Multer uploads)
    client_max_body_size 20M;

    # Dynamic compression for ultra-fast loading times (Gzip)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # A. Customer Frontend Reverse Proxy (Static Vite app served via Docker port 5173)
    location / {
        proxy_pass http://127.0.0.1:5083;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Standard proxy forwards for correct geo-location and SSL checks
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # B. Product Image Uploads Proxy (Express static uploads endpoint inside Docker port 5000)
    location /uploads {
        proxy_pass http://127.0.0.1:5080/uploads;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Caching parameters for fast load of static product files
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # C. API Backend Proxy (Express server endpoints inside Docker port 5000)
    location /api {
        proxy_pass http://127.0.0.1:5080/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings for payment order wait loops (e.g. Cashfree verification check)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # D. Socket.io WebSocket Connection (For real-time admin panel notification alerts)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5080/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 86400s; # Prevents socket timeouts
    }
}

# 2. Admin Panel Server Block (Admin frontend static app served via Docker port 5174)
server {
    listen 80;
    listen [::]:80;

    # REPLACE WITH YOUR ACTUAL ADMIN PANEL DOMAIN
    server_name admin.thespiritualtrends.com;

    location / {
        proxy_pass http://127.0.0.1:5084;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

