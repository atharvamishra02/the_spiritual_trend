name: VPS Production Docker CI/CD Deploy Pipeline

# Trigger fresh run to pick up newly updated secrets
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to VPS Server via SSH Execution
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT || 2222 }}
        script_stop: true
        script: |
          echo "========================================================================="
          echo "🚀 STARTING THE SPIRITUAL TREND AUTO-DEPLOY PIPELINE ON VPS SERVER"
          echo "========================================================================="
          
          # 1. DEFINE PATH OR RETRIEVE IN TARGET DIRECTORY
          # Standard directory: /var/www/the_spiritual_trend
          TARGET_DIR="/var/www/the_spiritual_trend"
          
          # Disable interactive git prompt so it fails fast rather than hanging
          export GIT_TERMINAL_PROMPT=0
          
          if [ ! -d "$TARGET_DIR/.git" ]; then
            echo "⚠️  Git repository not found at $TARGET_DIR. Initializing clone..."
            rm -rf "$TARGET_DIR"
            mkdir -p "$TARGET_DIR"
            cd "$TARGET_DIR"
            echo "🔄 Cloning the private repository using temporary GITHUB_TOKEN..."
            git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git .
          else
            cd "$TARGET_DIR"
            echo "🔄 Updating Git remote URL with current run GITHUB_TOKEN..."
            git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          fi
          
          # 2. DISCARD UNTRACKED FILES OR LOCAL ACCIDENTAL EDITS & FETCH LATEST COMMIT
          echo "📥 Fetching latest commits from Git branch 'main'..."
          git fetch --all
          git reset --hard origin/main
          
          # 3. VERIFY DOCKER & DOCKER COMPOSE CONFIGURATION
          if ! command -v docker > /dev/null 2>&1; then
            echo "❌ ERROR: Docker is not installed on this VPS! Install it first."
            exit 1
          fi
          
          # 4. DEPLOY PRODUCTION CONTAINERS VIA COMPOSE
          echo "🏗️  Rebuilding and launching updated containers in detached daemon mode..."
          
          # Support both 'docker-compose' and 'docker compose' syntax
          if command -v docker-compose > /dev/null 2>&1; then
            docker-compose down
            docker-compose up --build -d
          else
            docker compose down
            docker compose up --build -d
          fi
          
          # 5. POST-DEPLOYMENT CLEANUP (Pruning unused dangling build cache & old layers)
          echo "🧼 Cleaning up dangling image layers to free up server disk space..."
          docker image prune -f
          
          echo "========================================================================="
          echo "🎉 THE SPIRITUAL TREND DEPLOYED SUCCESSFUL!"
          echo "========================================================================="
